<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto py-10">

    <h1 class="text-2xl font-bold mb-6">SEO History</h1>

    {% if rows and rows|length > 0 %}

        {% for row in rows %}

        <div class="bg-white p-4 mb-4 rounded shadow">

            <h3 class="font-bold text-blue-600">
                {{ row.url }}
            </h3>

            <p>
                SEO:
                <strong>{{ row.seo_score }}</strong>
            </p>

            <p>
                GSEO:
                <strong>{{ row.gseo_score }}</strong>
            </p>

            <p class="text-sm text-gray-500">
                {{ row.created_at if row.created_at else "No date" }}
            </p>

        </div>

        {% endfor %}

    {% else %}

        <p class="text-gray-500">
            No history yet.
        </p>

    {% endif %}

    <a href="/" class="text-blue-500 mt-6 inline-block">
        ← Back to dashboard
    </a>

</div>

</body>
</html>
